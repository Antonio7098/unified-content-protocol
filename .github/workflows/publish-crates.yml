name: publish-crates

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  version-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify version sync (tag push)
        run: python scripts/check_version_sync.py --quiet --require-tag

  publish:
    needs: version-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify version sync (tag push)
        run: python scripts/check_version_sync.py --quiet --require-tag

      - name: Publish ucm-core to crates.io
        uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          path: ./crates/ucm-core
          ignore-unpublished-changes: true

      - name: Wait for crates.io indexing (core)
        run: sleep 30

      - name: Publish ucp-observe to crates.io
        uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          path: ./crates/ucp-observe
          ignore-unpublished-changes: true

      - name: Publish ucp-translator-markdown to crates.io
        uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          path: ./crates/translators/markdown
          ignore-unpublished-changes: true

      - name: Publish ucp-translator-html to crates.io
        uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          path: ./crates/translators/html
          ignore-unpublished-changes: true

      - name: Wait for crates.io indexing (foundations)
        run: sleep 30

      - name: Publish ucm-engine to crates.io
        uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          path: ./crates/ucm-engine
          ignore-unpublished-changes: true

      - name: Publish ucl-parser to crates.io
        uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          path: ./crates/ucl-parser
          ignore-unpublished-changes: true

      - name: Publish ucp-llm to crates.io
        uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          path: ./crates/ucp-llm
          ignore-unpublished-changes: true

      - name: Publish ucp-agent to crates.io
        uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          path: ./crates/ucp-agent
          ignore-unpublished-changes: true

      - name: Publish ucp-graph to crates.io
        uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          path: ./crates/ucp-graph
          ignore-unpublished-changes: true

      - name: Wait for crates.io indexing (runtime)
        run: sleep 30

      - name: Publish ucp-codegraph to crates.io
        uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          path: ./crates/ucp-codegraph
          ignore-unpublished-changes: true

      - name: Wait for crates.io indexing (codegraph)
        run: sleep 30

      - name: Publish ucp-api to crates.io
        uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          path: ./crates/ucp-api
          ignore-unpublished-changes: true

      - name: Wait for crates.io indexing (api)
        run: sleep 30

      - name: Publish ucp-cli to crates.io
        uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          path: ./crates/ucp-cli
          ignore-unpublished-changes: true
